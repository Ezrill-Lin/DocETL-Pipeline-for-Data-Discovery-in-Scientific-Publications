# Repository definitions: prefix patterns, canonical name, identifier schema,
# synonym group (for match-time equivalence), and URL templates.
#
# Field reference:
#   canonical          — repository name we emit downstream
#   aliases            — strings recognized as referring to this repository
#   prefixes           — accession prefixes that imply this repository
#   identifier_pattern — anchored regex an identifier MUST match to be valid
#                        (omit/leave blank to disable schema validation)
#   synonym_group      — repos sharing this group are treated as equivalent at
#                        triple-match time (e.g. PRIDE/ProteomeXchange both =
#                        "proteomexchange"). Defaults to lowercased canonical.
#   url_template       — {id} is replaced with the normalized identifier
#
# Adding a new repository here propagates automatically to:
#   - The candidate-passage filter in build_docetl_input.py
#   - The prefix list rendered into the LLM prompt
#   - URL construction in url_builder.py
#   - Repository synonym handling in match_records.py

repositories:
  - canonical: GEO
    aliases:
      - Gene Expression Omnibus
      - NCBI GEO
      - GEO
      - www.ncbi.nlm.nih.gov/geo
      - ncbi.nlm.nih.gov/geo
    prefixes: [GSE, GSM, GPL]
    identifier_pattern: "^(GSE|GSM|GPL)\\d+$"
    synonym_group: geo
    url_template: "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc={id}"

  - canonical: GEO
    aliases: []
    prefixes: [GDS]
    identifier_pattern: "^GDS\\d+$"
    synonym_group: geo
    url_template: "https://www.ncbi.nlm.nih.gov/sites/GDSbrowser?acc={id}"

  - canonical: PRIDE
    aliases:
      - PRIDE Archive
      - PRIDE
      - EBI PRIDE
      - www.ebi.ac.uk
      - ebi.ac.uk
      - www.ebi.ac.uk/pride
      - ebi.ac.uk/pride
    prefixes: [PXD]
    identifier_pattern: "^PXD\\d+$"
    synonym_group: proteomexchange
    url_template: "https://www.ebi.ac.uk/pride/archive/projects/{id}"

  - canonical: ProteomeXchange
    aliases:
      - ProteomeXchange
      - ProteomeCentral
      - PX
    prefixes: []
    identifier_pattern: "^PXD\\d+$"
    synonym_group: proteomexchange
    url_template: "https://proteomecentral.proteomexchange.org/cgi/GetDataset?ID={id}"

  - canonical: MassIVE
    aliases:
      - Massive
      - MassIVE
      - UCSD MassIVE
      - massive.ucsd.edu
      - www.massive.ucsd.edu
    prefixes: [MSV]
    identifier_pattern: "^MSV\\d+$"
    synonym_group: massive
    url_template: "https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession={id}"

  - canonical: jPOST
    aliases:
      - jPOST
      - jPOSTrepo
      - jpostdb.org
      - repository.jpostdb.org
      - www.jpostdb.org
    prefixes: [JPST]
    identifier_pattern: "^JPST\\d+$"
    synonym_group: jpost
    url_template: "https://repository.jpostdb.org/entry/{id}"

  - canonical: iProX
    aliases:
      - iProX
      - iprox.cn
      - www.iprox.cn
      - www.iprox.org
      - iprox.org
    prefixes: [IPX]
    identifier_pattern: "^IPX\\d+$"
    synonym_group: iprox
    url_template: "https://www.iprox.cn/page/project.html?id={id}"

  - canonical: PeptideAtlas
    aliases:
      - PeptideAtlas
      - PASS
    prefixes: [PASS]
    identifier_pattern: "^PASS\\d+$"
    synonym_group: peptideatlas
    url_template: "https://www.peptideatlas.org/PASS/{id}"

  - canonical: PanoramaPublic
    aliases:
      - Panorama Public
      - PanoramaPublic
      - Panorama
    prefixes: []
    identifier_pattern: ""
    synonym_group: panoramapublic
    url_template: ""

  - canonical: ArrayExpress
    aliases:
      - ArrayExpress
      - EBI ArrayExpress
      - BioStudies ArrayExpress
    prefixes: ["E-MTAB", "E-GEOD", "E-PROT", "E-MEXP"]
    identifier_pattern: "^E-(MTAB|GEOD|PROT|MEXP)-\\d+$"
    synonym_group: arrayexpress
    url_template: "https://www.ebi.ac.uk/biostudies/arrayexpress/studies/{id}"

  - canonical: SRA
    aliases:
      - Sequence Read Archive
      - SRA
      - NCBI SRA
      - www.ncbi.nlm.nih.gov/sra
      - ncbi.nlm.nih.gov/sra
    prefixes: [SRP, SRR, SRX, SRS, SRA]
    identifier_pattern: "^SR[PRXSA]\\d+$"
    synonym_group: ncbi-sra
    url_template: "https://www.ncbi.nlm.nih.gov/sra/?term={id}"

  - canonical: BioProject
    aliases:
      - BioProject
      - NCBI BioProject
      - www.ncbi.nlm.nih.gov/bioproject
      - ncbi.nlm.nih.gov/bioproject
    prefixes: [PRJNA, PRJEB, PRJDB]
    identifier_pattern: "^PRJ(NA|EB|DB)\\d+$"
    synonym_group: ncbi-sra
    url_template: "https://www.ncbi.nlm.nih.gov/bioproject/{id}"

  - canonical: BioSample
    aliases:
      - BioSample
      - NCBI BioSample
    prefixes: [SAMN, SAMEA, SAMD]
    identifier_pattern: "^SAM(N|EA|D)\\d+$"
    synonym_group: biosample
    url_template: "https://www.ncbi.nlm.nih.gov/biosample/{id}"

  - canonical: ENA
    aliases:
      - ENA
      - European Nucleotide Archive
    prefixes: [ERP, ERR, ERX, ERS]
    identifier_pattern: "^ER[PRXS]\\d+$"
    synonym_group: ena
    url_template: "https://www.ebi.ac.uk/ena/browser/view/{id}"

  - canonical: Dryad
    aliases:
      - Dryad
      - Dryad Digital Repository
    prefixes: []
    identifier_pattern: "^10\\.\\d{4,9}/.+$"
    synonym_group: dryad
    url_template: "https://doi.org/{id}"

  - canonical: Zenodo
    aliases:
      - Zenodo
    prefixes: []
    identifier_pattern: "^10\\.\\d{4,9}/.+$"
    synonym_group: zenodo
    url_template: "https://doi.org/{id}"

  - canonical: Figshare
    aliases:
      - Figshare
      - figshare
    prefixes: []
    identifier_pattern: "^10\\.\\d{4,9}/.+$"
    synonym_group: figshare
    url_template: "https://doi.org/{id}"

  - canonical: Dataverse
    aliases:
      - Dataverse
      - Harvard Dataverse
    prefixes: []
    identifier_pattern: "^10\\.\\d{4,9}/.+$"
    synonym_group: dataverse
    url_template: "https://doi.org/{id}"

  - canonical: MendeleyData
    aliases:
      - Mendeley Data
      - MendeleyData
      - data.mendeley.com
    prefixes: ["10.17632"]
    identifier_pattern: "^10\\.17632/.+$"
    synonym_group: mendeleydata
    url_template: "https://doi.org/{id}"

  - canonical: dbGaP
    aliases:
      - dbGaP
      - dbGap
      - dbGAP
      - dBGaP
      - database of Genotypes and Phenotypes
      - www.ncbi.nlm.nih.gov/projects/gap
      - ncbi.nlm.nih.gov/projects/gap
    prefixes: [phs]
    identifier_pattern: "^phs\\d+(\\.v\\d+)?(\\.p\\d+)?$"
    synonym_group: dbgap
    url_template: "https://www.ncbi.nlm.nih.gov/projects/gap/cgi-bin/study.cgi?study_id={id}"

  - canonical: PDB
    aliases:
      - PDB
      - Protein Data Bank
      - RCSB PDB
      - wwPDB
      - www.rcsb.org
      - rcsb.org
      - www.wwpdb.org
    prefixes: []
    identifier_pattern: "^[0-9][A-Za-z0-9]{3}$"
    synonym_group: pdb
    url_template: "https://www.rcsb.org/structure/{id}"

  - canonical: EGA
    aliases:
      - EGA
      - European Genome-Phenome Archive
      - European Genome Phenome Archive
      - ega-archive.org
      - www.ega-archive.org
    prefixes: [EGAS, EGAD]
    identifier_pattern: "^EGA[SD]\\d+$"
    synonym_group: ega
    url_template: "https://ega-archive.org/studies/{id}"

  - canonical: DepMap
    aliases:
      - DepMap
      - Dependency Map
      - Cancer Dependency Map
    prefixes: []
    identifier_pattern: ""
    synonym_group: depmap
    url_template: "https://depmap.org/portal/download/all/?releasename={id}"

  - canonical: PDC
    aliases:
      - PDC
      - Proteomic Data Commons
      - Proteomic Data Commons (PDC)
    prefixes: [PDC]
    identifier_pattern: "^PDC\\d+$"
    synonym_group: pdc
    url_template: "https://pdc.cancer.gov/pdc/study/{id}"

  - canonical: HumanProteinAtlas
    aliases:
      - Human Protein Atlas
      - HPA
    prefixes: []
    identifier_pattern: ""
    synonym_group: hpa
    url_template: "https://www.proteinatlas.org/{id}"

  - canonical: DOI
    aliases:
      - DOI
    prefixes: []
    identifier_pattern: "^10\\.\\d{4,9}/.+$"
    synonym_group: doi
    url_template: "https://doi.org/{id}"
