# DocETL pipeline for dataset reference extraction.
#
# Pipeline overview
# -----------------
# Stage 1 (LLM map): For each paper, read the pre-selected candidate passages
#   and emit a list of dataset references (identifier + repository + evidence
#   + confidence). The LLM does NOT invent URLs — that is done in deterministic
#   Python after this pipeline runs.
# Stage 2 (deterministic, post-pipeline): src/extraction/normalize_outputs.py
#   normalizes identifiers and repositories and constructs URLs.
#
# Inputs:
#   data/processed/papers.json — JSON array of paper records produced by
#   src/preprocess/build_docetl_input.build_json_array.
#
# Output:
#   data/predictions/docetl_raw.json — one row per input paper with a
#   `dataset_references` list. Flatten + URL-build via the normalize step.
#
# Notes:
# - Path placeholders ({{INPUT_PATH}}, {{OUTPUT_PATH}}, {{INTERMEDIATE_DIR}},
#   {{MODEL}}) are substituted by scripts/run_pipeline.py at runtime so the
#   YAML stays portable.

default_model: "{{MODEL}}"

datasets:
  papers:
    type: file
    path: "{{INPUT_PATH}}"

operations:
  - name: extract_dataset_references
    type: map
    output:
      schema:
        paper_id: string
        paper_doi: string
        pmcid: string
        pmid: string
        dataset_references: "list[{dataset_identifier: string, repository: string, evidence: string, confidence: string, notes: string}]"
    prompt: |
      You are a careful scientific data curator.

      Your task: extract every explicit dataset reference present in the
      passages below. A "dataset reference" is a pointer to a specific
      published dataset, identified by an accession number, repository
      record ID, or DOI (or some combination thereof).

      Paper identifiers (carry these through unchanged):
        paper_id: {{ input.paper_id }}
        paper_doi: {{ input.paper_doi }}
        pmcid: {{ input.pmcid }}
        pmid: {{ input.pmid }}

      Title: {{ input.title }}

      Candidate passages (data availability / methods / supplementary /
      figure captions / paragraphs that mention a repository or accession):

      {{ input.candidate_passages }}

      Repositories and their identifier patterns to look for:
      {{REPOSITORIES}}

      Anti-hallucination rules — these come first:
      A. Every identifier you emit MUST appear verbatim somewhere in the
         passages above. Copy/paste the exact characters, including the
         numeric portion. The list of repository prefixes above is for
         RECOGNITION ONLY — never use it as a template to invent
         identifiers (no "GSE12345", "PXD00001", etc., unless those exact
         strings are in the passages).
      B. If the candidate passages contain no accession-like identifier
         and no repository name, return an empty list for
         dataset_references. Do not guess from the title or your prior
         knowledge of the paper.
      C. Quote a short evidence snippet (≤ 240 chars) directly from the
         passages. The dataset_identifier you emit MUST be a substring
         (case-insensitive) of that evidence quote.

      Extraction rules:
      1. Extract every distinct dataset reference. Output one row per
         dataset. If the same identifier appears in two passages, emit
         it once.
      2. If an identifier is malformed (only a prefix, missing digits, or
         clearly truncated), DO NOT emit it. A bare "GSE" or "PXD" with
         no digits is never a valid dataset reference.
      3. If the repository is not named explicitly but the prefix is
         strongly diagnostic (GSE → GEO, PXD → PRIDE, MSV → MassIVE,
         PRJNA → BioProject, phs → dbGaP, EGAS → EGA, etc.), set the
         canonical repository name from the list above. Otherwise leave
         repository as an empty string.
      4. confidence ∈ {"high", "medium", "low"}. Use "high" only when
         both the identifier and the repository are explicit in the text.
      5. Do NOT include URLs. URL construction is handled downstream.

      N/A safety valve — emit "N/A" instead of guessing:
      - If the paper clearly references a dataset (e.g., names a
        repository, a study, or a portal) but does NOT provide a specific
        accession in the passages, emit ONE row with
        dataset_identifier = "N/A", repository = <the repository or
        organisation named>, evidence = the quoted phrase, confidence =
        "low", and a note like "repository named, no accession given".
      - If you genuinely cannot extract any reference, return an empty
        list. Never substitute a placeholder like "GSE12345" or "PXD00001"
        when you don't have a real identifier.

      Categorical exclusions (do NOT emit any of these as a dataset
      reference, no matter how the surrounding text is phrased):
      - Filenames of files downloaded from a repository
        (e.g. "CCLE_DepMap_19Q1_TPM.csv", "Table_S2_*.xlsx",
        "*.maf.txt", "*.gct", "NIHMS*-supplement-*.pdf"). These live
        INSIDE a dataset; the dataset is the parent record.
      - Version / release tags of a portal (e.g. "19Q1", "18Q3",
        "CCLE2019", "v1.2.0"). These name a release, not a dataset.
      - Software, tool, or package names and their version strings
        (MaxQuant, Andromeda, GATK, SAMtools, pyGAM,
        DoubletDetection, etc.) — including DOIs that point to a
        software release on Zenodo / GitHub. If the surrounding text
        describes a "package", "tool", "pipeline", "library", or
        "software", the DOI is software, not data.
      - Numbers in parentheses next to a cited entity, e.g.
        "DepMap (19)" — the "(19)" is a citation reference number, not
        a dataset identifier.
      - Reference databases used for annotation only (UniProt, RefSeq,
        Ensembl, Pfam, Gene Ontology, contaminant FASTAs) UNLESS the
        paper deposited new data there with a specific accession.
      - GenBank single-record accessions for reagents (vectors,
        plasmids, primers, individual sequences) — these are
        construct-level, not dataset-level.
      - Datasets cited from OTHER published papers in the References
        section that the current paper merely re-analyses without
        depositing new data — only extract if the current paper itself
        used the dataset as a primary input AND gives the accession.

      When a paper deposits data via PRIDE (which mirrors to
      ProteomeXchange), the canonical repository for a PXD identifier is
      PRIDE. When a paper deposits via BioProject, the BioProject
      accession (PRJNA / PRJEB / PRJDB) is the canonical, even if the
      passage also names SRA. Pick one canonical repository per
      identifier — do not duplicate the same accession under two
      repository labels.

      Always copy paper_id, paper_doi, pmcid, pmid into your response
      verbatim from the values above.
    validate:
      - "isinstance(output['dataset_references'], list)"

pipeline:
  steps:
    - name: extract
      input: papers
      operations:
        - extract_dataset_references
  output:
    type: file
    path: "{{OUTPUT_PATH}}"
    intermediate_dir: "{{INTERMEDIATE_DIR}}"
