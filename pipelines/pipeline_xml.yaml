# DocETL Pipeline for Extracting Dataset References from Scientific Papers (XML Format)
# This pipeline uses DocETL's decomposition approach to process papers section-by-section
# following a more sophisticated RTR (Reduce-Then-Retrieve) pattern

parsing_tools:
  - name: xml_section_parser
    function_code: |
      def xml_section_parser(document: Dict) -> List[Dict]:
          """
          Parse XML to extract structured sections instead of flattening to text.
          Preserves section titles, types, and hierarchy for better downstream processing.
          """
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import re
          
          xml_path = document["xml_path"]
          
          # Check if file exists
          if not Path(xml_path).exists():
              return [{"sections": [{"title": "ERROR", "type": "error", "content": f"File not found: {xml_path}"}]}]
          
          try:
              # Parse XML
              tree = ET.parse(xml_path)
              root = tree.getroot()
              
              sections = []
              
              # Helper function to extract text from XML element
              def get_text(element):
                  if element is None:
                      return ""
                  text = "".join(element.itertext())
                  return re.sub(r'\s+', ' ', text).strip()
              
              # Extract article metadata
              article_meta = root.find('.//article-meta')
              if article_meta:
                  # Add title as first section
                  title_elem = article_meta.find('.//article-title')
                  if title_elem is not None:
                      sections.append({
                          "title": "Title",
                          "type": "front",
                          "content": get_text(title_elem)
                      })
                  
                  # Extract abstract
                  abstract = article_meta.find('.//abstract')
                  if abstract is not None:
                      sections.append({
                          "title": "Abstract",
                          "type": "front",
                          "content": get_text(abstract)
                      })
              
              # Extract body sections
              body = root.find('.//body')
              if body is not None:
                  for sec in body.findall('.//sec'):
                      title_elem = sec.find('title')
                      sec_title = get_text(title_elem) if title_elem is not None else "Unnamed Section"
                      
                      # Get section content (excluding nested sections' titles)
                      content_parts = []
                      for elem in sec:
                          if elem.tag != 'sec':  # Skip nested sections
                              content_parts.append(get_text(elem))
                      
                      sections.append({
                          "title": sec_title,
                          "type": "body",
                          "content": " ".join(content_parts)
                      })
              
              # Extract back matter (includes data availability, acknowledgements, etc.)
              back = root.find('.//back')
              if back is not None:
                  # Data availability statements
                  for sec in back.findall('.//sec'):
                      title_elem = sec.find('title')
                      sec_title = get_text(title_elem) if title_elem is not None else "Back Matter"
                      sections.append({
                          "title": sec_title,
                          "type": "back",
                          "content": get_text(sec)
                      })
                  
                  # Acknowledgements
                  ack = back.find('.//ack')
                  if ack is not None:
                      sections.append({
                          "title": "Acknowledgements",
                          "type": "back",
                          "content": get_text(ack)
                      })
                  
                  # Notes
                  for note in back.findall('.//fn-group'):
                      sections.append({
                          "title": "Notes",
                          "type": "back",
                          "content": get_text(note)
                      })
              
              # References (usually less useful for dataset extraction)
              ref_list = root.find('.//ref-list')
              if ref_list is not None:
                  sections.append({
                      "title": "References",
                      "type": "references",
                      "content": get_text(ref_list)[:5000]  # Truncate references
                  })
              
              return [{"sections": sections}]
              
          except Exception as e:
              return [{"sections": [{"title": "ERROR", "type": "error", "content": f"Failed to parse {xml_path}: {str(e)}"}]}]

datasets:
  scientific_papers:
    type: file
    source: local
    path: "../data/input/xml/xml_papers_input.json"
    parsing:
      - function: xml_text_parser

default_model: gpt-4o-mini

system_prompt:
  dataset_description: "A collection of scientific research papers in XML format"
  persona: "A research data specialist analyzing scientific publications to identify and catalog dataset usage"

operations:
  # Step 1: Extract dataset references from each paper
  - name: extract_datasets
    type: map
    prompt: |
      Analyze the following scientific paper content:
      
      {{ input.paper_content }}
      
      Extract ALL dataset references mentioned in this paper. For each dataset, identify:
      1. Dataset identifier/name (e.g., "ImageNet", "MNIST", "COVID-19 Open Research Dataset", accession codes like "GSE12345", "PXD123456")
      2. Repository or data source (e.g., "GenBank", "GEO", "PRIDE", "ProteomeXchange", "dbGaP", "PubMed Central")
      3. URL or DOI if explicitly mentioned
      
      Look for datasets in:
      - Data/Methods sections
      - Acknowledgments
      - Data availability statements
      - References
      - Supplementary materials mentions
      - Dataset accession sections
      
      Return a list of all datasets found. If no URL is explicitly mentioned, leave it as an empty string.
      If no repository is mentioned, leave it as an empty string.
      If no datasets are found, return an empty list.
    output:
      schema:
        datasets: "list[{dataset_identifier: string, repository: string, url: string}]"
    validate:
      - isinstance(output["datasets"], list)
    num_retries_on_validate_failure: 2

  # Step 2: Unnest the datasets list so each dataset is a separate item
  - name: unnest_datasets
    type: unnest
    unnest_key: datasets

  # Step 2.5: Flatten the nested datasets object to top-level fields
  - name: flatten_dataset_fields
    type: map
    prompt: |
      Extract the dataset fields from the nested structure and return them as top-level fields.
      The dataset information is: {{ input.datasets }}
      
      Return the following fields at the top level:
      - dataset_identifier: {{ input.datasets.dataset_identifier }}
      - repository: {{ input.datasets.repository }}
      - url: {{ input.datasets.url }}
    output:
      schema:
        dataset_identifier: string
        repository: string
        url: string

  # Step 3: Filter out empty/invalid dataset entries
  - name: filter_valid_datasets
    type: filter
    prompt: |
      Review this dataset entry:
      
      Dataset Identifier: {{ input.dataset_identifier }}
      Repository: {{ input.repository }}
      URL: {{ input.url }}
      
      Is this a valid, real dataset reference (not a placeholder, generic term, or empty entry)?
      Return true only if the dataset_identifier is specific and meaningful.
    output:
      schema:
        valid: bool

  # Step 4: Resolve similar dataset names to standardize entries
  - name: resolve_datasets
    type: resolve
    blocking_keys:
      - dataset_identifier
    blocking_threshold: 0.7
    comparison_prompt: |
      Compare these two dataset references:
      
      Dataset 1: {{ input1.dataset_identifier }}
      Repository 1: {{ input1.repository }}
      
      Dataset 2: {{ input2.dataset_identifier }}
      Repository 2: {{ input2.repository }}
      
      Are these referring to the same dataset? Consider:
      - Similar names with slight variations (e.g., "ImageNet-1K" vs "ImageNet 1000")
      - Same repository and similar identifiers
      - Common abbreviations or full names
    embedding_model: text-embedding-3-small
    resolution_prompt: |
      Given these matched dataset references:
      {% for entry in inputs %}
      Entry {{ loop.index }}:
        - Name: {{ entry.dataset_identifier }}
        - Repository: {{ entry.repository }}
        - URL: {{ entry.url }}
      {% endfor %}
      
      Determine the best standardized dataset name and consolidate the information:
      - Use the most complete and commonly used name
      - If multiple URLs exist, prefer DOIs or official repository links
      - Consolidate repository information
    output:
      schema:
        dataset_identifier: string
        repository: string
        url: string

  # Step 5: Aggregate all papers using each dataset
  - name: aggregate_dataset_usage
    type: reduce
    reduce_key:
      - dataset_identifier
    prompt: |
      This dataset "{{ reduce_key }}" appears in {{ inputs|length }} paper(s):
      
      {% for paper in inputs %}
      Paper {{ loop.index }}:
        - XML Path: {{ paper.xml_path }}
        - Repository Info: {{ paper.repository }}
        - URL: {{ paper.url }}
      {% endfor %}
      
      Provide a consolidated record for this dataset with:
      1. The standardized dataset name
      2. The most authoritative repository information
      3. The best available URL (prefer DOIs, then official repository links)
      4. Count of papers using this dataset
      5. List of paper file paths
    output:
      schema:
        dataset_identifier: string
        repository: string
        url: string
        num_papers: int
        paper_paths: list[string]

pipeline:
  steps:
    - name: extract_dataset_references
      input: scientific_papers
      operations:
        - extract_datasets
        - unnest_datasets
        - flatten_dataset_fields
        - filter_valid_datasets
        - resolve_datasets
        - aggregate_dataset_usage
  output:
    type: file
    path: "../data/output/xml_results/xml_dataset_references_output.json"
    intermediate_dir: "../intermediate_results/xml_pipeline"
