# DocETL Pipeline for Extracting Dataset References from Scientific Papers (XML Format)
# This pipeline uses DocETL's decomposition approach to process papers section-by-section
# following a more sophisticated RTR (Reduce-Then-Retrieve) pattern

parsing_tools:
  - name: xml_section_parser
    function_code: |
      def xml_section_parser(document: Dict) -> List[Dict]:
          """
          Parse XML to extract structured sections instead of flattening to text.
          Preserves section titles, types, and hierarchy for better downstream processing.
          """
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import re
          
          xml_path = document["xml_path"]
          
          # Check if file exists
          if not Path(xml_path).exists():
              return [{"sections": [{"title": "ERROR", "type": "error", "content": f"File not found: {xml_path}"}]}]
          
          try:
              # Parse XML
              tree = ET.parse(xml_path)
              root = tree.getroot()
              
              sections = []
              
              # Helper function to extract text from XML element
              def get_text(element):
                  if element is None:
                      return ""
                  text = "".join(element.itertext())
                  return re.sub(r'\s+', ' ', text).strip()
              
              # Extract article metadata
              article_meta = root.find('.//article-meta')
              if article_meta:
                  # Add title as first section
                  title_elem = article_meta.find('.//article-title')
                  if title_elem is not None:
                      sections.append({
                          "title": "Title",
                          "type": "front",
                          "content": get_text(title_elem)
                      })
                  
                  # Extract abstract
                  abstract = article_meta.find('.//abstract')
                  if abstract is not None:
                      sections.append({
                          "title": "Abstract",
                          "type": "front",
                          "content": get_text(abstract)
                      })
              
              # Extract body sections
              body = root.find('.//body')
              if body is not None:
                  for sec in body.findall('.//sec'):
                      title_elem = sec.find('title')
                      sec_title = get_text(title_elem) if title_elem is not None else "Unnamed Section"
                      
                      # Get section content (excluding nested sections' titles)
                      content_parts = []
                      for elem in sec:
                          if elem.tag != 'sec':  # Skip nested sections
                              content_parts.append(get_text(elem))
                      
                      sections.append({
                          "title": sec_title,
                          "type": "body",
                          "content": " ".join(content_parts)
                      })
              
              # Extract back matter (includes data availability, acknowledgements, etc.)
              back = root.find('.//back')
              if back is not None:
                  # Data availability statements
                  for sec in back.findall('.//sec'):
                      title_elem = sec.find('title')
                      sec_title = get_text(title_elem) if title_elem is not None else "Back Matter"
                      sections.append({
                          "title": sec_title,
                          "type": "back",
                          "content": get_text(sec)
                      })
                  
                  # Acknowledgements
                  ack = back.find('.//ack')
                  if ack is not None:
                      sections.append({
                          "title": "Acknowledgements",
                          "type": "back",
                          "content": get_text(ack)
                      })
                  
                  # Notes
                  for note in back.findall('.//fn-group'):
                      sections.append({
                          "title": "Notes",
                          "type": "back",
                          "content": get_text(note)
                      })
              
              # References (usually less useful for dataset extraction)
              ref_list = root.find('.//ref-list')
              if ref_list is not None:
                  sections.append({
                      "title": "References",
                      "type": "references",
                      "content": get_text(ref_list)[:5000]  # Truncate references
                  })
              
              return [{"sections": sections}]
              
          except Exception as e:
              return [{"sections": [{"title": "ERROR", "type": "error", "content": f"Failed to parse {xml_path}: {str(e)}"}]}]

datasets:
  scientific_papers:
    type: file
    source: local
    path: "../data/input/xml/xml_papers_input.json"
    parsing:
      - function: xml_section_parser

default_model: gpt-4o-mini

system_prompt:
  dataset_description: "A collection of scientific research papers in XML format, processed section-by-section"
  persona: "A research data specialist analyzing scientific publications to identify and catalog dataset usage"

operations:
  # Step 1: Split papers into individual sections (decomposition)
  # This is DocETL's key strength - breaking documents into manageable chunks
  - name: split_into_sections
    type: unnest
    unnest_key: sections
    keep_empty: false

  # Step 2: Filter for sections likely to contain dataset references
  # This implements the "Reduce" part of RTR (Reduce-Then-Retrieve)
  - name: filter_relevant_sections
    type: filter
    prompt: |
      Section Title: {{ input.sections.title }}
      Section Type: {{ input.sections.type }}
      
      First 200 characters of content: {{ input.sections.content[:200] }}...
      
      Is this section likely to contain dataset references or data availability information?
      
      Look for sections about:
      - Methods or Materials and Methods
      - Data Availability
      - Data Sharing
      - Datasets or Data Sources
      - Supplementary Information
      - Acknowledgements (sometimes contains dataset info)
      - Results (may mention specific datasets)
      
      Exclude:
      - References/Bibliography (unless explicitly a data citation section)
      - Pure introduction/background sections
      - Abstract (unless paper is specifically about a dataset)
      
      Return true if this section is likely relevant for dataset extraction.
    output:
      schema:
        is_relevant: bool

  # Step 3: Extract dataset references from relevant sections
  # This implements the "Retrieve" part of RTR - targeted extraction
  - name: extract_datasets_from_section
    type: map
    prompt: |
      From this scientific paper section, extract dataset references:
      
      Section: {{ input.sections.title }}
      Content: {{ input.sections.content }}
      
      Extract ALL dataset identifiers mentioned. Look for:
      - Accession codes (GSE#####, PXD#####, phs######, SRP####, etc.)
      - Named datasets (specific database entries, not just database names)
      - DOIs that point to datasets
      - Dataset URLs or repository links
      
      For each dataset found, provide:
      1. dataset_identifier: The specific ID or name (e.g., "GSE60052", "PDC000234")
      2. repository: The database/repository name (e.g., "GEO", "ProteomeXchange", "dbGaP")
      3. url: Any URL or DOI mentioned (if available)
      
      IMPORTANT:
      - Extract ONLY specific dataset identifiers, NOT general database names
      - "GEO" alone is NOT a dataset - "GSE60052" IS a dataset
      - "ProteomeXchange" alone is NOT a dataset - "PXD052949" IS a dataset
      - Exclude funding agency identifiers
      - Exclude software or tool names unless they are datasets
      
      If no specific datasets are found in this section, return an empty list.
    output:
      schema:
        datasets: "list[{dataset_identifier: string, repository: string, url: string}]"
    validate:
      - isinstance(output["datasets"], list)
    num_retries_on_validate_failure: 2

  # Step 4: Unnest datasets extracted from each relevant section
  - name: unnest_datasets
    type: unnest
    unnest_key: datasets
    keep_empty: false

  # Step 5: Flatten the nested dataset structure
  - name: flatten_dataset_fields
    type: map
    prompt: |
      Extract dataset fields from: {{ input.datasets }}
      
      Return as top-level fields:
      - dataset_identifier: {{ input.datasets.dataset_identifier }}
      - repository: {{ input.datasets.repository }}
      - url: {{ input.datasets.url }}
    output:
      schema:
        dataset_identifier: string
        repository: string
        url: string

  # Step 6: Filter out invalid entries
  - name: filter_valid_datasets
    type: filter
    prompt: |
      Dataset: {{ input.dataset_identifier }}
      Repository: {{ input.repository }}
      
      Is this a valid, specific dataset identifier?
      
      Valid examples: GSE60052, PXD052949, phs003416.v1.p1, PDC000234
      Invalid examples: GEO, ProteomeXchange, PRIDE (just database names)
      Invalid examples: Funding IDs, software names, general database mentions
      
      Return true only if this is a specific dataset identifier.
    output:
      schema:
        valid: bool

  # Step 7: Resolve similar dataset identifiers
  - name: resolve_datasets
    type: resolve
    blocking_keys:
      - dataset_identifier
    blocking_threshold: 0.7
    comparison_prompt: |
      Dataset 1: {{ input1.dataset_identifier }} ({{ input1.repository }})
      Dataset 2: {{ input2.dataset_identifier }} ({{ input2.repository }})
      
      Are these the same dataset? Consider case variations and version suffixes.
    embedding_model: text-embedding-3-small
    resolution_prompt: |
      Consolidate these dataset references:
      {% for entry in inputs %}
      - {{ entry.dataset_identifier }} ({{ entry.repository }}) - {{ entry.url }}
      {% endfor %}
      
      Provide the canonical identifier and best repository/URL information.
    output:
      schema:
        dataset_identifier: string
        repository: string
        url: string

  # Step 8: Aggregate by dataset to count paper usage
  - name: aggregate_dataset_usage
    type: reduce
    reduce_key:
      - dataset_identifier
    prompt: |
      Dataset "{{ reduce_key }}" appears in {{ inputs|length }} paper(s).
      
      Papers: {% for paper in inputs %}{{ paper.xml_path }}{% if not loop.last %}, {% endif %}{% endfor %}
      
      Consolidate these entries into one final record.
      Choose the best repository name from the non-empty repository values.
      Choose the best URL from the non-empty URL values.
      Include the final paper count and paper paths.
    output:
      schema:
        dataset_identifier: string
        repository: string
        url: string
        num_papers: int
        paper_paths: list[string]

pipeline:
  steps:
    - name: extract_dataset_references
      input: scientific_papers
      operations:
        - split_into_sections           # Decompose papers into sections
        - filter_relevant_sections       # Reduce to relevant sections (RTR pattern)
        - extract_datasets_from_section  # Extract from focused sections
        - unnest_datasets                # Unpack consolidated datasets
        - flatten_dataset_fields         # Flatten nested structure
        - filter_valid_datasets          # Clean invalid entries
        - resolve_datasets               # Deduplicate similar identifiers
        - aggregate_dataset_usage        # Aggregate by dataset
  output:
    type: file
    path: "../data/output/xml_results/xml_dataset_references_output.json"
    intermediate_dir: "../intermediate_results/xml_pipeline"
