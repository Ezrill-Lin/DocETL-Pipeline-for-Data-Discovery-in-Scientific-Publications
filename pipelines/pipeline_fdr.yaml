# DocETL FDR (Full-Document Read) pipeline for dataset reference extraction.
#
# Pipeline overview
# -----------------
# Stage 1 (LLM map): For each paper, read the full extracted document text
#   and emit a list of dataset references (identifier + repository + evidence
#   + confidence). The LLM does NOT invent URLs — that is done in deterministic
#   Python after this pipeline runs.
# Stage 2 (deterministic, post-pipeline): src/extraction/normalize_outputs.py
#   normalizes identifiers and repositories and constructs URLs.
#
# Inputs:
#   data/processed/papers.json — JSON array of paper records produced by
#   src/preprocess/build_docetl_input.build_json_array. Each record contains
#   a `full_text` field with the entire cleaned document text.
#
# Output schema is identical to pipeline_rtr.yaml (RTR) so
# that the same normalize_outputs.py and evaluate_docetl.py work unchanged.
#
# Notes:
# - Path placeholders ({{INPUT_PATH}}, {{OUTPUT_PATH}}, {{INTERMEDIATE_DIR}},
#   {{MODEL}}) are substituted by scripts/run_pipeline.py at runtime so the
#   YAML stays portable.
# - FDR differs from RTR only in what text the LLM receives: full_text
#   (entire document) vs candidate_passages (pre-filtered passages).

default_model: "{{MODEL}}"

# Self-imposed rate limits so DocETL backs off rather than hitting API limits.
# Tune count values to match your API tier:
#   gemini-2.5-flash free tier : 1 000 000 TPM / 10 RPM
#   gemini-2.5-flash paid tier : 4 000 000 TPM / 1 000 RPM
rate_limits:
  llm_call:
    - count: 900
      per: 1
      unit: MINUTE
  llm_tokens:
    - count: 3500000
      per: 1
      unit: MINUTE

datasets:
  papers:
    type: file
    path: "{{INPUT_PATH}}"

operations:
  - name: extract_dataset_references
    type: map
    max_batch_size: 1
    output:
      schema:
        paper_id: string
        paper_doi: string
        pmcid: string
        pmid: string
        dataset_references: "list[{dataset_identifier: string, repository: string, evidence: string, confidence: string, notes: string}]"
    prompt: |
      You are a careful scientific data curator.

      Your task: extract every explicit dataset reference present in the
      full document text below. A "dataset reference" is a pointer to a
      specific published dataset, identified by an accession number, repository
      record ID, or DOI (or some combination thereof).

      Paper identifiers (carry these through unchanged):
        paper_id: {{ input.paper_id }}
        paper_doi: {{ input.paper_doi }}
        pmcid: {{ input.pmcid }}
        pmid: {{ input.pmid }}

      Title: {{ input.title }}

      Full document text (entire paper — search all sections including methods,
      data availability, figure captions, supplementary mentions, and back matter):

      {{ input.full_text }}

      Repositories and their identifier patterns to look for:
        - GEO: GSE####, GSM####, GPL####, GDS####
        - ProteomeXchange: PXD######
        - PRIDE: PXD###### (deposited via ProteomeXchange)
        - MassIVE: MSV######
        - jPOST: JPST######
        - iProX: IPX######
        - PeptideAtlas / PASS: PASS#####
        - PanoramaPublic
        - ArrayExpress: E-MTAB-####, E-GEOD-####, E-PROT-####, E-MEXP-####
        - SRA: SRP######, SRR######, SRX######, SRS######
        - BioProject: PRJNA######, PRJEB######, PRJDB######
        - BioSample: SAMN########, SAMEA########
        - ENA: ERP######, ERR######, ERX######
        - Dryad / Zenodo / Figshare / Dataverse / Mendeley Data: a DOI

      Rules — read carefully:
      1. Extract ONLY identifiers explicitly written in the paper.
         Never invent or guess identifiers.
      2. If text says "data are available upon request" with NO identifier
         and NO repository, do not output a row.
      3. If multiple distinct datasets are mentioned, output one row per
         dataset. Do NOT emit the same dataset twice — if the same
         identifier appears in multiple places, output it once.
      4. If an identifier is malformed or partial, still extract it but
         set confidence to "low" and explain in notes.
      5. If the repository is not named but the prefix is strongly
         diagnostic (GSE → GEO, PXD → ProteomeXchange, MSV → MassIVE,
         PRJNA → BioProject, etc.), set the canonical repository name.
         Otherwise leave repository as an empty string.
      6. Quote a short evidence snippet (≤ 240 chars) directly from the
         text so the extraction is auditable.
      7. confidence ∈ {"high", "medium", "low"}. Use "high" only when both
         the identifier and the repository are explicit in the text.
      8. Do NOT include URLs. URL construction is handled downstream.
      9. If no dataset references are present, return an empty list for
         dataset_references.

      What is NOT a dataset reference (do not extract these):
      - Filenames of files downloaded from a repository
        (e.g. "CCLE_DepMap_19Q1_TPM.csv", "Table_S2_*.xlsx",
        "*.maf.txt", "*.gct"). These live INSIDE a dataset; the
        dataset is the parent record.
      - Release tags or version labels for a portal (e.g. DepMap "19Q1",
        "18Q3", "CCLE2019"). These name a release, not a dataset.
      - Software / tool names and their version strings
        (MaxQuant, Andromeda, GATK, SAMtools, etc.).
      - Reference databases used for searching/annotation only
        (UniProt, RefSeq, Ensembl, Pfam, Gene Ontology, contaminant
        FASTAs) UNLESS the paper deposited new data there with a
        specific accession.
      - Datasets cited from OTHER published papers in the References
        section that the current paper merely re-analyses without
        depositing new data — only extract if the current paper itself
        used the dataset as a primary input AND gives the accession.

      When the paper uses a "release" of a portal (e.g. DepMap 19Q1),
      output ONE row at the level of the underlying repository accession
      (e.g. the dbGaP study or SRA project that backs that release) if
      the paper names one; otherwise emit a single row with the portal
      name as the repository and the release tag as the identifier and
      confidence = "low".

      Always copy paper_id, paper_doi, pmcid, pmid into your response
      verbatim from the values above.
    validate:
      - "isinstance(output['dataset_references'], list)"

pipeline:
  steps:
    - name: extract
      input: papers
      operations:
        - extract_dataset_references
  output:
    type: file
    path: "{{OUTPUT_PATH}}"
    intermediate_dir: "{{INTERMEDIATE_DIR}}"
